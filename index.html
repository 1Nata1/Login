<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Login - Wiki</title>
  </head>
  <body>
    <main class="container">
      <form id="loginForm">
        <h1>Login</h1>
        <div class="input-box">
          <input id="username" placeholder="Usuario" type="text" required />
          <i class="bx bxs-user"></i>
        </div>
        <div class="input-box">
          <input id="password" placeholder="Senha" type="password" required />
          <i class="bx bxs-lock-alt"></i>
        </div>
        <div id="loginError" style="color: red; text-align: center; margin-bottom: 10px; display: none;">
          Usuário ou senha incorretos!
        </div>
        <div class="Lembrar">
          <label>
            <input type="checkbox" id="remember" />
            Lembrar senha
          </label>
          <a href="#">Esqueci a senha</a>
        </div>
        <button type="submit" class="Login">Login</button>
        <div class="Cadastro">
          <p>Não tem uma conta <a href="#">Cadastre-se</a></p>
        </div>
      </form>
    </main>

    <script>
      const loginForm = document.getElementById("loginForm");
      const loginError = document.getElementById("loginError");

      // Verifica se já está logado
      if (localStorage.getItem("wikiLogado") === "true") {
        window.location.href = "https://1nata1.github.io/Wiki/";
      }

      loginForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        // Credenciais fixas — depois podemos mudar
        if (username === "Nata" && password === "123456") {
          if (document.getElementById("remember").checked) {
            localStorage.setItem("wikiLogado", "true");
            localStorage.setItem("wikiUsuario", username);
          } else {
            sessionStorage.setItem("wikiLogado", "true");
            sessionStorage.setItem("wikiUsuario", username);
          }
          window.location.href = "https://1nata1.github.io/Wiki/";
        } else {
          loginError.style.display = "block";
        }
      });
    </script>
  </body>
</html>
